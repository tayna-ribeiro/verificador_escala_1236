name: 🤖 CI — Verificador de Escala 12x36

# Quando rodar este pipeline:
on:
  push:
    branches: [ "main", "develop" ]   # A cada push nessas branches
  pull_request:
    branches: [ "main" ]              # A cada PR aberto para a main

# Variáveis de ambiente seguras (usadas nos testes, não são as reais)
env:
  BOT_TOKEN: "123456789:FAKE_TOKEN_ONLY_FOR_CI_TESTS"
  WEBHOOK_SECRET: "fake_secret_ci"

jobs:
  # ----------------------------------------------------------------
  # JOB 1 — Lint e formatação (qualidade de código)
  # ----------------------------------------------------------------
  lint:
    name: 🔍 Lint & Formatação
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Instalar dependências de lint
        run: |
          pip install --upgrade pip
          pip install flake8 

      - name: 🔍 Verificar erros de sintaxe e estilo (flake8)
        run: |
          # Para o CI se houver erros graves (E9=sintaxe, F63=bugs, F7=warnings, F82=undefined)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=__pycache__,.git
          # Avisos de estilo: não derruba o CI, apenas exibe
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 \
            --statistics --exclude=__pycache__,.git

  # ----------------------------------------------------------------
  # JOB 2 — Testes automatizados (roda após o lint)
  # ----------------------------------------------------------------
  tests:
    name: 🧪 Testes Automatizados
    runs-on: ubuntu-latest
    needs: lint   # Só roda se o lint passar

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]   # Testa em 3 versões do Python

    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Instalar dependências do projeto
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📦 Instalar dependências de teste
        run: |
          pip install pytest pytest-asyncio pytest-cov

      - name: 🧪 Rodar testes unitários e de integração
        run: |
          pytest tests/ \
            --tb=short \
            --asyncio-mode=auto \
            -v

      - name: 📊 Gerar relatório de cobertura
        run: |
          pytest tests/ \
            --asyncio-mode=auto \
            --cov=bot \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -q

      - name: 📤 Enviar cobertura ao Codecov (opcional)
        # Remove este passo se não quiser usar o Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'  # Envia apenas uma vez
        with:
          files: coverage.xml
          fail_ci_if_error: false   # Não quebra o CI se Codecov falhar
        continue-on-error: true

  # ----------------------------------------------------------------
  # JOB 3 — Testes de integridade do projeto
  # ----------------------------------------------------------------
  integridade:
    name: 🛡️ Integridade do Projeto
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: 🛡️ Rodar apenas testes de integridade
        run: |
          pytest tests/test_integridade.py \
            --asyncio-mode=auto \
            -v \
            --tb=short

  # ----------------------------------------------------------------
  # JOB 4 — Resumo (badge de status)
  # ----------------------------------------------------------------
  status:
    name: ✅ Pipeline Concluído
    runs-on: ubuntu-latest
    needs: [lint, tests, integridade]
    if: always()

    steps:
      - name: Verificar resultado geral
        run: |
          echo "Lint:       ${{ needs.lint.result }}"
          echo "Testes:     ${{ needs.tests.result }}"
          echo "Integridade: ${{ needs.integridade.result }}"

          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.tests.result }}" != "success" ] || \
             [ "${{ needs.integridade.result }}" != "success" ]; then
            echo "❌ Uma ou mais etapas falharam!"
            exit 1
          fi
          echo "✅ Tudo certo! Pipeline passou com sucesso."
