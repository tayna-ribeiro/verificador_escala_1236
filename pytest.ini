# pytest.ini
# Configuração central do pytest para o projeto verificaEscala1236

[pytest]
# Modo asyncio: auto = detecta coroutines automaticamente
asyncio_mode = auto

# Diretório de testes padrão
testpaths = tests

# Formato de saída mais legível
addopts =
    --tb=short
    -v

# Ignora arquivos que não são testes
norecursedirs = .git __pycache__ .env
